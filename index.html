<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Vertical - Linha Azul Sempre Visível 😂</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #6a11cb, #2575fc);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .navbar {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(12px);
      padding: 30px 25px;
      border-radius: 25px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
      width: 300px;
      text-align: center;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      color: #2575fc;
      margin-bottom: 35px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .menu a {
      text-decoration: none;
      color: #333;
      font-weight: 600;
      font-size: 18px;
      padding: 16px 20px;
      border-radius: 15px;
      position: relative;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: left;
      overflow: hidden;
    }

    /* Fundo suave no hover */
    .menu a:hover {
      background: #f0f4ff;
      color: #2575fc;
      transform: translateX(12px);
    }

    /* LINHA AZUL SEMPRE VISÍVEL em TODOS os botões */
    .menu a::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 6px;
      height: 65%;                    /* altura fixa - sempre visível */
      background: linear-gradient(to bottom, #6a11cb, #2575fc);
      border-radius: 0 4px 4px 0;
      transition: all 0.4s ease;
    }

    /* Efeito extra quando passa o mouse */
    .menu a:hover::before {
      width: 10px;   /* linha fica um pouco mais grossa no hover */
    }

    /* Item ativo (clicado) - fica ainda mais destacado */
    .menu a.active {
      background: #f0f4ff;
      color: #2575fc;
      transform: translateX(12px);
    }

    .menu a.active::before {
      width: 10px;
      background: linear-gradient(to bottom, #2575fc, #6a11cb);
    }

    @media (max-width: 480px) {
      .navbar {
        width: 90%;
        padding: 25px 15px;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="logo">Menu</div>
    
    <div class="menu" id="menu">
      <a href="#" class="active">Início</a>
      <a href="#">Sobre</a>
      <a href="#">Serviços</a>
      <a href="#">Portfólio</a>
      <a href="#">Contato</a>
    </div>
  </nav>

  <script>
    const links = document.querySelectorAll('.menu a');

    links.forEach(link => {
      link.addEventListener('click', () => {
        links.forEach(l => l.classList.remove('active'));
        link.classList.add('active');
      });
    });

    console.log('%cLinha azul agora fica SEMPRE visível em todos os botões! Efeito coletivo ativado 😂', 
      'color: #2575fc; font-size: 16px; font-weight: bold;');
  </script>

</body>
</html>
